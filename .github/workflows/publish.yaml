name: Build and publish Docker image

on:
  push:
    tags:
      - '*'
    branches:
      - develop

env:
  BRANCH_BUILD_TAGS: "latest,develop"

jobs:
  # -------------------------------------------------------------------------
  # Validate tag / branch and compute image tags
  # -------------------------------------------------------------------------
  parse-docker-build-env:
    name: Parse Docker Build Environment
    runs-on: ubuntu-latest
    outputs:
      buildTags: ${{ steps.detect-push-event.outputs.buildTags }}
    steps:
      - name: Determine build tags
        id: detect-push-event
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected: $TAG"
            if [[ ! "$TAG" =~ ^[6-9]\.[0-9]+\.[0-9]+(-(M|RC|CP)[0-9]{2})?_[0-9]+$ ]]; then
              echo "::error::Invalid tag format: $TAG (expected e.g. 7.2.0_1 or 7.2.0-M01_1)"
              exit 1
            fi
            echo "buildTags=$TAG" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "Branch push detected: $BRANCH"
            echo "buildTags=${{ env.BRANCH_BUILD_TAGS }}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown ref type: $GITHUB_REF"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Publish to Docker Hub
  # -------------------------------------------------------------------------
  build-dockerhub-image:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    needs: parse-docker-build-env
    steps:
      - uses: exo-actions/buildDockerImage-action@v1
        with:
          dockerImage: "exoplatform/exo-enterprise"
          dockerImageTag: ${{ needs.parse-docker-build-env.outputs.buildTags }}
          platforms: "linux/arm64,linux/amd64"
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # -------------------------------------------------------------------------
  # Publish to GHCR with signing and attestation
  # -------------------------------------------------------------------------
  build-ghcr-image:
    name: Build and push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: parse-docker-build-env
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: exo-actions/buildDockerImage-action@v1
        with:
          dockerRegistry: "ghcr.io"
          dockerImage: "exoplatform/exo-enterprise"
          dockerImageTag: ${{ needs.parse-docker-build-env.outputs.buildTags }}
          platforms: "linux/arm64,linux/amd64"
          cosignImage: true
          cosignOidcImage: true
          attestImage: true
          attestImageRegistry: "ghcr.io"
          DOCKER_USERNAME: ${{ secrets.SWF_ACTOR }}
          DOCKER_PASSWORD: ${{ secrets.SWF_TOKEN }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

  # -------------------------------------------------------------------------
  # Post-publish smoke test (GHCR image)
  # -------------------------------------------------------------------------
  smoke-test:
    name: Smoke test published image
    runs-on: ubuntu-latest
    needs: [build-ghcr-image]
    steps:
      - name: Pull and inspect image
        run: |
          IMAGE="ghcr.io/exoplatform/exo-enterprise:${{ needs.parse-docker-build-env.outputs.buildTags }}"
          docker pull "$IMAGE"
          docker inspect "$IMAGE"
